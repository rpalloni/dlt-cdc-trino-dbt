connector.name=iceberg
iceberg.catalog.type=jdbc
iceberg.jdbc-catalog.catalog-name=olake_iceberg
iceberg.jdbc-catalog.connection-url=jdbc:postgresql://postgres-source:5432/pgsource
iceberg.jdbc-catalog.connection-user=pgsource
iceberg.jdbc-catalog.connection-password=pgsource
iceberg.jdbc-catalog.default-warehouse-dir=s3://iceberg/
iceberg.jdbc-catalog.driver-class=org.postgresql.Driver

fs.s3.enabled=true
s3.endpoint=http://minio:9000
s3.path-style-access=true
s3.aws-access-key=admin
s3.aws-secret-key=password
s3.region=eu-central-1